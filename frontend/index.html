<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:title" content="Solar Forecast Dashboard — Arizona" />
  <meta property="og:description"
    content="A dashboard showcasing solar forecasts for Arizona, built with Flask and Open-Meteo data." />
  <meta property="og:image" content="https://cdn.midjourney.com/80eb2443-8ff9-478a-9a64-f4eaf184da14/0_1.png" />
  <title>Solar Forecast Dashboard — Arizona</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1f2937;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #f0a500;
      --accent2: #3b82f6;
      --accent3: #10b981;
      --danger: #ef4444;
      --glow: rgba(240, 165, 0, 0.15);
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ───────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-left h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
    }

    .header-left p {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 2px;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    select,
    button {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    select:hover,
    button:hover {
      border-color: var(--accent);
    }

    button.primary {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 600;
    }

    button.primary:hover {
      background: #d4920a;
    }

    /* ── Status bar ───────────────────────────────────────────── */
    #status-bar {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 6px 28px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 20px;
    }

    #status-bar span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.green {
      background: var(--accent3);
    }

    .dot.yellow {
      background: var(--accent);
    }

    .dot.red {
      background: var(--danger);
    }

    /* ── Layout ───────────────────────────────────────────────── */
    main {
      padding: 24px 28px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto auto;
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── Cards ────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      overflow: hidden;
    }

    .card.full-width {
      grid-column: 1 / -1;
    }

    .card h2 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card h2 .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      text-transform: none;
      letter-spacing: 0;
      color: var(--accent);
    }

    /* ── KPI row ──────────────────────────────────────────────── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      grid-column: 1 / -1;
    }

    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      position: relative;
      overflow: hidden;
    }

    .kpi::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: var(--accent);
      border-radius: 2px 0 0 2px;
    }

    .kpi.blue::after {
      background: var(--accent2);
    }

    .kpi.green::after {
      background: var(--accent3);
    }

    .kpi.red::after {
      background: var(--danger);
    }

    .kpi-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .kpi-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .kpi-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Chart containers ─────────────────────────────────────── */
    .chart-wrap {
      position: relative;
      height: 280px;
    }

    canvas {
      max-width: 100%;
    }

    /* ── Table ────────────────────────────────────────────────── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .data-table th {
      text-align: left;
      padding: 8px 12px;
      color: var(--muted);
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .data-table td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    .data-table tr:last-child td {
      border-bottom: none;
    }

    .data-table tr:hover td {
      background: var(--surface2);
    }

    .pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .pill.high {
      background: rgba(240, 165, 0, 0.15);
      color: var(--accent);
    }

    .pill.med {
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent2);
    }

    .pill.low {
      background: rgba(16, 185, 129, 0.15);
      color: var(--accent3);
    }

    .button-container {
      display: flex;
      flex-direction: row;
      /* Default side-by-side */
      gap: 16px;
      /* Spacing between buttons */
      justify-content: center;
      /* Center them horizontally */
    }

    .selection-container {
      display: flex;
      flex-direction: row;
      gap: 10px;
      justify-content: center;
    }

    /* ── Loading / empty states ───────────────────────────────── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--muted);
      font-size: 13px;
      flex-direction: column;
      gap: 10px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 768px) {
      main {
        grid-template-columns: 1fr;
      }

      .kpi-grid {
        grid-template-columns: 1fr 1fr;
      }

      .selection-container {
        flex-direction: column;
        align-items: stretch;
      }

      .button-container {
        flex-direction: column;
        align-items: stretch;
        /* Optional: Makes buttons full-width on mobile */
      }

      .data-table th,
      .data-table td {
        padding: 8px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="header-left">
      <h1>☀ Solar Forecast Dashboard</h1>
      <p>Arizona — powered by Open-Meteo</p>
    </div>
    <div class="header-controls">
      <div class="selection-container">
        <select id="location-select">
          <option value="">Loading locations...</option>
        </select>
        <select id="days-select">
          <option value="3">3-day forecast</option>
          <option value="7" selected>7-day forecast</option>
        </select>
      </div>
      <div class="button-container">
        <button class="primary" onclick="refreshAll()">↻ Refresh</button>
        <button onclick="triggerIngest()">⬇ Fetch Data</button>
      </div>
    </div>
  </header>

  <div id="status-bar">
    <span><span class="dot" id="db-dot"></span> <span id="db-status">Connecting...</span></span>
    <span id="last-updated"></span>
  </div>

  <main>

    <!-- KPI Cards -->
    <div class="kpi-grid" id="kpi-row">
      <div class="kpi" id="kpi-peak">
        <div class="kpi-label">Peak GHI Today</div>
        <div class="kpi-value">—</div>
        <div class="kpi-sub">W/m²</div>
      </div>
      <div class="kpi blue" id="kpi-avg">
        <div class="kpi-label">Avg GHI (7-day)</div>
        <div class="kpi-value">—</div>
        <div class="kpi-sub">W/m²</div>
      </div>
      <div class="kpi green" id="kpi-temp">
        <div class="kpi-label">Avg Temp</div>
        <div class="kpi-value">—</div>
        <div class="kpi-sub">°C</div>
      </div>
      <div class="kpi red" id="kpi-cloud">
        <div class="kpi-label">Avg Cloud Cover</div>
        <div class="kpi-value">—</div>
        <div class="kpi-sub">%</div>
      </div>
    </div>

    <!-- Hourly GHI Chart -->
    <div class="card full-width">
      <h2>Hourly Irradiance (GHI) <span class="badge">7-day forecast</span></h2>
      <div class="chart-wrap">
        <canvas id="ghi-chart"></canvas>
      </div>
    </div>

    <!-- Daily Summary Chart -->
    <div class="card">
      <h2>Daily Peak GHI <span class="badge">forecast</span></h2>
      <div class="chart-wrap">
        <canvas id="daily-chart"></canvas>
      </div>
    </div>

    <!-- Temperature + Cloud Cover -->
    <div class="card">
      <h2>Temperature & Cloud Cover <span class="badge">forecast</span></h2>
      <div class="chart-wrap">
        <canvas id="temp-chart"></canvas>
      </div>
    </div>

    <!-- Daily Summary Table -->
    <div class="card full-width">
      <h2>7-Day Summary Table</h2>
      <div id="table-container">
        <div class="loading">
          <div class="spinner"></div><span>Loading...</span>
        </div>
      </div>
    </div>

  </main>

  <script>
    // ── Config ────────────────────────────────────────────────────────
    const API = "";  // Empty = same origin. Change to "http://localhost:5000" if needed.

    // ── State ─────────────────────────────────────────────────────────
    let ghiChart = null;
    let dailyChart = null;
    let tempChart = null;
    let currentLocationId = null;

    // ── Chart defaults ─────────────────────────────────────────────────
    Chart.defaults.color = "#8b949e";
    Chart.defaults.borderColor = "#30363d";
    Chart.defaults.font.family = "'Segoe UI', system-ui, sans-serif";
    Chart.defaults.font.size = 12;

    // ── Utilities ──────────────────────────────────────────────────────
    async function apiFetch(path) {
      const resp = await fetch(API + path);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${path}`);
      return resp.json();
    }

    function setStatus(ok, msg) {
      const dot = document.getElementById("db-dot");
      const label = document.getElementById("db-status");
      dot.className = "dot " + (ok ? "green" : "red");
      label.textContent = msg;
    }

    function setKPI(id, value, decimals = 0) {
      const el = document.querySelector(`#${id} .kpi-value`);
      if (el) el.textContent = value !== null && value !== undefined
        ? Number(value).toFixed(decimals)
        : "—";
    }

    function ghiPill(val) {
      if (val > 600) return `<span class="pill high">${val.toFixed(0)}</span>`;
      if (val > 300) return `<span class="pill med">${val.toFixed(0)}</span>`;
      return `<span class="pill low">${val.toFixed(0)}</span>`;
    }

    // ── Load locations ─────────────────────────────────────────────────
    async function loadLocations() {
      try {
        const locs = await apiFetch("/api/locations");
        const sel = document.getElementById("location-select");
        sel.innerHTML = locs.map(l =>
          `<option value="${l.id}">${l.name}</option>`
        ).join("");
        if (locs.length > 0) {
          currentLocationId = locs[0].id;
          refreshAll();
        }
        setStatus(true, "Connected");
      } catch (e) {
        setStatus(false, "Cannot reach API — is Flask running?");
        document.getElementById("location-select").innerHTML =
          `<option>API unavailable</option>`;
      }
    }

    // ── Main refresh ───────────────────────────────────────────────────
    async function refreshAll() {
      const sel = document.getElementById("location-select");
      currentLocationId = parseInt(sel.value);
      const days = document.getElementById("days-select").value;

      document.getElementById("last-updated").textContent =
        "Updated " + new Date().toLocaleTimeString();

      try {
        const [hourly, daily] = await Promise.all([
          apiFetch(`/api/forecast?location_id=${currentLocationId}&days=${days}`),
          apiFetch(`/api/forecast/daily?location_id=${currentLocationId}`)
        ]);

        if (Array.isArray(hourly) && hourly.length > 0) {
          renderGHIChart(hourly);
          renderTempChart(hourly);
        }

        if (Array.isArray(daily) && daily.length > 0) {
          renderDailyChart(daily);
          renderTable(daily);
          updateKPIs(daily, hourly);
        } else {
          document.getElementById("table-container").innerHTML =
            `<div class="loading"><span>No data yet. Click "Fetch Data" to pull from Open-Meteo.</span></div>`;
        }
      } catch (e) {
        setStatus(false, "Error loading data: " + e.message);
      }
    }

    // ── KPI updates ────────────────────────────────────────────────────
    function updateKPIs(daily, hourly) {
      const today = daily[0];
      if (today) {
        setKPI("kpi-peak", today.peak_ghi, 0);
        setKPI("kpi-cloud", today.avg_cloud, 0);
        setKPI("kpi-temp", today.avg_temp, 1);
      }
      const avgGhi = daily.reduce((s, d) => s + (d.avg_ghi || 0), 0) / daily.length;
      setKPI("kpi-avg", avgGhi, 0);
    }

    // ── Charts ─────────────────────────────────────────────────────────
    function renderGHIChart(data) {
      const labels = data.map(d => d.forecast_time.slice(11, 16)); // HH:MM
      const ghi = data.map(d => d.shortwave_radiation || 0);
      const rolling = data.map(d => d.ghi_rolling || 0);

      const ctx = document.getElementById("ghi-chart").getContext("2d");
      if (ghiChart) ghiChart.destroy();

      ghiChart = new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [
            {
              label: "GHI (W/m²)",
              data: ghi,
              borderColor: "rgba(240,165,0,0.5)",
              backgroundColor: "rgba(240,165,0,0.05)",
              borderWidth: 1,
              pointRadius: 0,
              fill: true,
              tension: 0.3,
            },
            {
              label: "6-hr Rolling Avg",
              data: rolling,
              borderColor: "#f0a500",
              borderWidth: 2.5,
              pointRadius: 0,
              fill: false,
              tension: 0.4,
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: { legend: { position: "top" } },
          scales: {
            x: { ticks: { maxTicksLimit: 14, maxRotation: 0 } },
            y: {
              title: { display: true, text: "W/m²" },
              beginAtZero: true,
            }
          }
        }
      });
    }

    function renderDailyChart(data) {
      const ctx = document.getElementById("daily-chart").getContext("2d");
      if (dailyChart) dailyChart.destroy();

      dailyChart = new Chart(ctx, {
        type: "bar",
        data: {
          labels: data.map(d => d.date),
          datasets: [{
            label: "Peak GHI (W/m²)",
            data: data.map(d => d.peak_ghi),
            backgroundColor: data.map(d =>
              d.peak_ghi > 700 ? "rgba(240,165,0,0.8)" :
                d.peak_ghi > 400 ? "rgba(59,130,246,0.7)" :
                  "rgba(16,185,129,0.6)"
            ),
            borderRadius: 5,
            borderSkipped: false,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: {
              beginAtZero: true,
              title: { display: true, text: "W/m²" }
            }
          }
        }
      });
    }

    function renderTempChart(data) {
      // Downsample to every 3 hours to avoid noise
      const sampled = data.filter((_, i) => i % 3 === 0);
      const ctx = document.getElementById("temp-chart").getContext("2d");
      if (tempChart) tempChart.destroy();

      tempChart = new Chart(ctx, {
        type: "line",
        data: {
          labels: sampled.map(d => d.forecast_time.slice(5, 13)), // MM-DD HH
          datasets: [
            {
              label: "Temp (°C)",
              data: sampled.map(d => d.temperature_2m),
              borderColor: "#ef4444",
              backgroundColor: "rgba(239,68,68,0.08)",
              borderWidth: 2,
              pointRadius: 0,
              fill: true,
              tension: 0.4,
              yAxisID: "y",
            },
            {
              label: "Cloud Cover (%)",
              data: sampled.map(d => d.cloud_cover),
              borderColor: "#3b82f6",
              backgroundColor: "rgba(59,130,246,0.08)",
              borderWidth: 2,
              pointRadius: 0,
              fill: true,
              tension: 0.4,
              yAxisID: "y1",
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: { legend: { position: "top" } },
          scales: {
            y: { title: { display: true, text: "°C" } },
            y1: {
              position: "right",
              title: { display: true, text: "%" },
              min: 0, max: 150,
              grid: { drawOnChartArea: false }
            }
          }
        }
      });
    }

    // ── Table ──────────────────────────────────────────────────────────
    function renderTable(data) {
      const rows = data.map(d => `
    <tr>
      <td>${d.date}</td>
      <td>${ghiPill(d.peak_ghi)}</td>
      <td>${d.avg_ghi.toFixed(0)}</td>
      <td>${d.avg_temp.toFixed(1)}</td>
      <td>${d.avg_cloud.toFixed(0)}%</td>
      <td>${d.total_precip.toFixed(1)}</td>
    </tr>
  `).join("");

      document.getElementById("table-container").innerHTML = `
    <table class="data-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Peak GHI (W/m²)</th>
          <th>Avg GHI (W/m²)</th>
          <th>Avg Temp (°C)</th>
          <th>Avg Cloud</th>
          <th>Precip (mm)</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
    }

    // ── Manual ingest trigger ──────────────────────────────────────────
    async function triggerIngest() {
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = "Fetching...";
      setStatus(true, "Fetching from Open-Meteo...");
      try {
        await fetch(API + "/api/ingest?fetch_type=forecast", { method: "POST" });
        await fetch(API + "/api/ingest?fetch_type=historical", { method: "POST" });
        setStatus(true, "Fetch complete");
        await refreshAll();
      } catch (e) {
        setStatus(false, "Fetch failed: " + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "⬇ Fetch Data";
      }
    }

    // ── Location change ────────────────────────────────────────────────
    document.getElementById("location-select").addEventListener("change", refreshAll);
    document.getElementById("days-select").addEventListener("change", refreshAll);

    // ── Init ──────────────────────────────────────────────────────────
    loadLocations();
  </script>
</body>

</html>
